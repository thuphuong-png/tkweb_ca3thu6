<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 2 - Buổi 9</title>
   
</head>
<body>
    <div class="container">
        <h2>Thông tin sinh viên</h2>
        <div id="result"></div>
    </div>

    <script>
        // 1. Khai báo biến ban đầu
        const fullName = "Nguyen Thu Phuong";
        const studentId = "26A4042132";

        // 2. Tạo Email: phuongnt.26a4042132@hvnh.edu.vn
        const nameParts = fullName.toLowerCase().split(" ");
        const firstName = nameParts[nameParts.length - 1]; // phuong
        let initials = ""; // sẽ chứa "nt"
        for (let i = 0; i < nameParts.length - 1; i++) {
            initials += nameParts[i][0];
        }
        const email = `${firstName}${initials}.${studentId.toLowerCase()}@hvnh.edu.vn`;

        // 3. Xác định Khóa và Khoa
        const coursePeriod = studentId.substring(0, 2); // 2 ký tự đầu: 26
        // Lấy mã ngành từ ký tự thứ 3 đến thứ 6 (Ví dụ: A404)
        const facultyCode = studentId.substring(2, 6); 
        let faculty = "Chưa xác định";

        // Kiểm tra dựa trên facultyCode để dùng được cho cả khóa 26, 27, 28...
        if (facultyCode === "A401") faculty = "Ngân hàng, Tài chính";
        else if (facultyCode === "A404") faculty = "Công nghệ thông tin & Kinh tế số";
        else if (facultyCode === "A402") faculty = "Kế toán - Kiểm toán";
        else if (facultyCode === "A407") faculty = "Kinh tế đầu tư";
        else if (facultyCode === "A405") faculty = "Quản trị kinh doanh; Kinh doanh quốc tế";
        else if (facultyCode === "A406") faculty = "Luật kinh tế";
        else if (facultyCode === "A403") faculty = "QTDL";
        else if (facultyCode === "A751") faculty = "Ngôn ngữ";

        // 4. Tính tổng 4 số cuối
        const lastFour = studentId.slice(-4); // "2132"
        let sum = 0;
        for (let char of lastFour) {
            sum += parseInt(char);
        }

        // 5. In kết quả ra màn hình
        document.getElementById("result").innerHTML = `
            <p><strong>Email:</strong> <span class="highlight">${email}</span></p>
            <p>Xin chào <span class="highlight">${fullName}</span>, 
            bạn là sinh viên khóa <span class="highlight">${coursePeriod}</span>, 
            khoa <span class="highlight">${faculty}</span>, 
            tổng 4 số cuối trong mã sinh viên là <span class="highlight">${sum}</span>.</p>
        `;
    </script>
</body>
</html>
